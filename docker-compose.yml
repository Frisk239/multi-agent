# S10：记忆专用 PostgreSQL + pgvector（任务库仍为 SQLite）
# 启动：docker compose up -d
# 连接示例：postgresql://ma:ma@127.0.0.1:5432/ma_memory
services:
  memory-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ma
      POSTGRES_PASSWORD: ma
      POSTGRES_DB: ma_memory
    ports:
      - "5432:5432"
    volumes:
      - ma_memory_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ma -d ma_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ma_memory_pg:
